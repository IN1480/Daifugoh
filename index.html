<!-- index.html -->
<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Local大富豪</title>

        <!-- CSSとの連携 -->
        <link rel="stylesheet" href="./css/common.css">
        <link rel="stylesheet" href="./css/card.css">
        <link rel="stylesheet" href="./css/button.css">

        <link rel="stylesheet" href="./css/titleScreen/titleScreen.css">

        <link rel="stylesheet" href="./css/gameScreen/gameScreen.css">
        <link rel="stylesheet" href="./css/gameScreen/fieldArea.css">
        <link rel="stylesheet" href="./css/gameScreen/infoArea.css">
        <link rel="stylesheet" href="./css/gameScreen/playerArea.css">

        <link rel="stylesheet" href="./css/ruleScreen/ruleScreen.css">

        <!-- JSとの連携 -->
        <script type="module" src="./js/main.js"></script>
    </head>

    <body>
        <!-- タイトル画面 -->
        <div id="title-screen" class="screen">
            <h1 id="title">Local 大富豪</h1>

            <input
                id="name-input"
                type="text"
                placeholder="プレイヤー名を入力"
                maxlength="12"
                spellcheck="false">

            <button id="start-button" class="button">スタート</button>
            <button id="rule-button" class="button">ルール設定</button>
        </div>

        <!-- ゲーム画面 -->
        <div id="game-screen" class="screen hidden">
            <!-- インフォメーションエリア -->
            <div id="info-area" class="area">
                <div id="turn"></div>

                <div id="other-players"></div>

                <div id="field-effect"></div>
            </div>

            <!-- 場 -->
            <div id="field" class="area">
                <!-- 出されたカードを表示 -->
            </div>

            <!-- プレイヤー領域 -->
            <div id="player-area" class="area">

                <div id="hand">
                    <!-- 手札カード -->
                </div>

                <button id="play-button" class="button">
                    出す
                </button>
            </div>
            
            <button id="back-to-title-button" class="button">タイトル</button>
            <div id="player-name"></div>
        </div>

        <div id="rule-screen" class="screen hidden">
            <button id="apply-button" class="button">OK</button>
        </div>

        <!-- リザルト画面 -->
        <div id="result-screen" class="screen hidden">

        </div>
    </body>
</html>
