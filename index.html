<!-- index.html -->
<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Local大富豪</title>

        <!-- CSSとの連携 -->

        <link rel="stylesheet" href="./css/titleScreen/titleScreen.css">

        <link rel="stylesheet" href="./css/gameScreen/gameScreen.css">
        <link rel="stylesheet" href="./css/gameScreen/field.css">
        <link rel="stylesheet" href="./css/gameScreen/infoArea.css">
        <link rel="stylesheet" href="./css/gameScreen/playerArea.css">

        <link rel="stylesheet" href="./css/ruleScreen/ruleScreen.css">

        <link rel="stylesheet" href="./css/player.css">
        <link rel="stylesheet" href="./css/card.css">
        <link rel="stylesheet" href="./css/button.css">
        <link rel="stylesheet" href="./css/common.css">

        <!-- JSとの連携 -->
        <script type="module" src="./js/main.js"></script>

        <!-- 画像の先読み -->
        <link rel="preload" as="image" href="images/background/black_red_check_PC.jpg" media="(min-width:601px)">
        <link rel="preload" as="image" href="images/background/black_red_check_Phone.jpg" media="(max-width:600px)">
        <link rel="preload" as="image" href="images/background/green_diamond_PC.jpg">
        <link rel="preload" as="image" href="images/grass.jpg">
    </head>

    <body>
        <!--=== タイトル画面 ===-->
        <div id="title-screen" class="screen">
            <h1 id="title">Local 大富豪</h1>

            <input
                id="name-input"
                type="text"
                placeholder="プレイヤー名を入力"
                maxlength="12"
                spellcheck="false">

            <div id="title-button-area" class="button-area">
                <button id="start-solo-button" class="button">ひとりで</button>
                <button id="start-multi-button" class="button">みんなと(N/I)</button>
            </div>

            <button id="rule-button" class="button">ルール設定</button>
        </div>

        <!--=== ゲーム画面 ===-->
        <div id="game-screen" class="screen hidden">
            <!-- インフォメーションエリア -->
            <div id="info-area" class="area">
                <div id="turn"></div>

                <div id="other-players"></div>

                <div id="field-effect"></div>
            </div>

            <!-- 場 -->
            <div id="field-frame" class="wood-like">
                <div id="field" class="area">
                    <!-- 出されたカードを表示 -->
                </div>
            </div>

            <!-- プレイヤー領域 -->
            <div id="player-area" class="area">

                <div id="hand"></div><!-- 手札カード -->

                <div id="game-button-area" class="button-area hidden">
                    <button id="pass-button" class="button">パス</button>
                    <button id="play-button" class="button">出す</button>
                </div>
            </div>
            
            <button id="back-to-title-button" class="button">タイトル</button>
            <div id="player-name"></div>
        </div>

        <!--=== ルール設定画面 ===-->
        <div id="rule-screen" class="screen hidden">
            <button id="apply-button" class="button">OK</button>
        </div>

        <!--=== リザルト画面 ===-->
        <div id="result-screen" class="screen hidden">

        </div>
    </body>
</html>
